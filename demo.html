<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Direct Share & Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; display: flex; gap: 20px; }
        .panel { background: #222; padding: 20px; border-radius: 10px; flex: 1; border: 1px solid #444; }
        input, button { padding: 10px; margin-top: 10px; width: 100%; border-radius: 5px; border: none; box-sizing: border-box; }
        input { background: #333; color: white; }
        button { background: #0088cc; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #006699; }
        .user-item { background: #333; padding: 10px; margin-top: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .user-item button { width: auto; margin: 0; padding: 5px 15px; background: #28a745; }
        #chatBox { height: 250px; background: #000; padding: 10px; overflow-y: auto; margin-top: 10px; font-family: monospace; font-size: 13px; }
        .progress-bar { background: #444; border-radius: 5px; margin-top: 10px; height: 10px; width: 100%; overflow: hidden; display: none;}
        .progress-fill { background: #28a745; height: 100%; width: 0%; transition: 0.1s; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>1. Your Identity</h2>
        <input type="text" id="deviceName" placeholder="Enter Device Name (e.g., Rahul's PC)">
        <button onclick="registerDevice()">Go Online</button>

        <h2 style="margin-top:30px;">2. Active Devices</h2>
        <div id="usersList">Join to see devices...</div>
    </div>

    <div class="panel" id="transferPanel" style="opacity: 0.5; pointer-events: none;">
        <h2 id="connectionStatus">🔴 Not Connected</h2>
        
        <div id="chatBox"></div>
        
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button onclick="sendMessage()" style="width:30%;">Send</button>
        </div>

        <hr style="border-color:#444; margin: 20px 0;">
        
        <h3>Share Large File (P2P)</h3>
        <input type="file" id="fileInput">
        <button onclick="sendFile()">Send File Directly</button>
        
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="fileStatus" style="font-size:12px; margin-top:5px; color:#aaa;"></div>
    </div>

<script>
    const socket = io('https://chat-api-zeta-ecru.vercel.app');
    let myName = "";
    let peerConnection;
    let dataChannel;
    let connectedPeerId = null;

    // WebRTC Configuration (Public Google STUN servers help bypass standard home firewalls)
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // --- 1. SIGNALING & USERS LOGIC ---
    function registerDevice() {
        myName = document.getElementById('deviceName').value.trim();
        if(!myName) return alert("Please enter a device name");
        socket.emit('register_device', myName);
        document.getElementById('deviceName').disabled = true;
    }

    socket.on('update_user_list', (users) => {
        const listDiv = document.getElementById('usersList');
        listDiv.innerHTML = '';
        users.forEach(u => {
            if(u.id !== socket.id) {
                listDiv.innerHTML += `
                    <div class="user-item">
                        <span>📱 ${u.name}</span>
                        <button onclick="sendRequest('${u.id}', '${u.name}')">Connect</button>
                    </div>
                `;
            }
        });
    });

    // --- 2. CONNECTION REQUEST LOGIC ---
    function sendRequest(targetId, targetName) {
        logChat(`Sent connection request to ${targetName}...`);
        socket.emit('send_request', { targetId, senderName: myName });
    }

    socket.on('incoming_request', (data) => {
        const accept = confirm(`📱 ${data.senderName} wants to connect with your device. Accept?`);
        socket.emit('request_response', { 
            senderId: data.senderId, 
            status: accept ? 'accepted' : 'denied',
            responderName: myName
        });

        if(accept) {
            connectedPeerId = data.senderId;
            setupWebRTC(false); // Responder creates Answer later
        }
    });

    socket.on('request_status', (data) => {
        if(data.status === 'accepted') {
            logChat(`✅ ${data.responderName} accepted your request! Establishing P2P Tunnel...`);
            connectedPeerId = data.responderId;
            activatePanel(data.responderName);
            setupWebRTC(true); // Requester creates the Offer
        } else {
            logChat(`❌ ${data.responderName} denied your request.`);
        }
    });

    function activatePanel(peerName) {
        document.getElementById('transferPanel').style.opacity = "1";
        document.getElementById('transferPanel').style.pointerEvents = "auto";
        document.getElementById('connectionStatus').innerText = `🟢 Connected to: ${peerName}`;
    }

    // --- 3. WEBRTC P2P TUNNEL SETUP ---
    async function setupWebRTC(isInitiator) {
        peerConnection = new RTCPeerConnection(rtcConfig);

        // ICE Candidate Handling (Finding the best network path)
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('webrtc_ice_candidate', { target: connectedPeerId, candidate: event.candidate });
            }
        };

        if (isInitiator) {
            // Create Data Channel for Chat/Files
            dataChannel = peerConnection.createDataChannel('sendDataChannel');
            setupDataChannel();

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc_offer', { target: connectedPeerId, offer: offer });
        } else {
            // Wait for data channel from initiator
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel();
                activatePanel("Peer"); 
            };
        }
    }

    // WebRTC Signaling Handlers
    socket.on('webrtc_offer', async (data) => {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('webrtc_answer', { target: data.senderId || connectedPeerId, answer: answer });
    });

    socket.on('webrtc_answer', async (data) => {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
    });

    socket.on('webrtc_ice_candidate', async (data) => {
        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
    });

    // --- 4. DATA CHANNEL (CHAT & FILES) ---
    function setupDataChannel() {
        dataChannel.onopen = () => logChat("🚀 P2P Tunnel Opened! You can now share files at max speed.");
        dataChannel.onclose = () => logChat("🔌 P2P Tunnel Closed.");
        
        // Handling incoming data
        dataChannel.onmessage = (event) => {
            if (typeof event.data === 'string') {
                if (event.data.startsWith('META:')) {
                    // Incoming file metadata
                    const meta = JSON.parse(event.data.replace('META:', ''));
                    receiveFileStart(meta);
                } else {
                    // Normal Chat Message
                    logChat(`[Peer]: ${event.data}`);
                }
            } else {
                // Incoming File Chunk (Binary Data)
                receiveFileChunk(event.data);
            }
        };
    }

    function sendMessage() {
        const msg = document.getElementById('msgInput').value;
        if(msg && dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(msg);
            logChat(`[Me]: ${msg}`);
            document.getElementById('msgInput').value = '';
        }
    }

    // --- 5. ULTRA-FAST LARGE FILE CHUNKING LOGIC ---
    // Chunk size: 64 KB (Best for WebRTC stability)
    const CHUNK_SIZE = 64 * 1024; 
    
    function sendFile() {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return alert("Select a file!");
        if(dataChannel.readyState !== 'open') return alert("P2P not connected!");

        // 1. Send Metadata first
        dataChannel.send(`META:${JSON.stringify({ name: file.name, size: file.size, type: file.type })}`);
        
        // 2. Start reading & sending chunks
        let offset = 0;
        const reader = new FileReader();
        const progressFill = document.getElementById('progressFill');
        document.getElementById('progressBar').style.display = 'block';

        reader.onload = (e) => {
            dataChannel.send(e.target.result); // Send chunk
            offset += e.target.result.byteLength;
            
            // Update UI
            const percent = (offset / file.size) * 100;
            progressFill.style.width = `${percent}%`;
            document.getElementById('fileStatus').innerText = `Sending: ${(offset/1024/1024).toFixed(2)} MB / ${(file.size/1024/1024).toFixed(2)} MB`;

            if (offset < file.size) {
                readSlice(offset); // Read next chunk
            } else {
                logChat(`✅ File Sent Successfully: ${file.name}`);
                setTimeout(() => document.getElementById('progressBar').style.display = 'none', 2000);
            }
        };

        const readSlice = (o) => {
            const slice = file.slice(offset, o + CHUNK_SIZE);
            reader.readAsArrayBuffer(slice);
        };
        readSlice(0);
    }

    // Receiving File State
    let incomingFile = { meta: null, buffers: [], receivedSize: 0 };

    function receiveFileStart(meta) {
        incomingFile.meta = meta;
        incomingFile.buffers = [];
        incomingFile.receivedSize = 0;
        logChat(`📥 Incoming file: ${meta.name} (${(meta.size/1024/1024).toFixed(2)} MB)...`);
    }

    function receiveFileChunk(chunk) {
        incomingFile.buffers.push(chunk);
        incomingFile.receivedSize += chunk.byteLength;

        if (incomingFile.receivedSize === incomingFile.meta.size) {
            // File is complete! Assemble and download.
            const blob = new Blob(incomingFile.buffers, { type: incomingFile.meta.type });
            const url = URL.createObjectURL(blob);
            
            logChat(`✅ File Received! <a href="${url}" download="${incomingFile.meta.name}" style="color:#00ff00;">Download ${incomingFile.meta.name}</a>`);
            
            // Reset state
            incomingFile = { meta: null, buffers: [], receivedSize: 0 };
        }
    }

    function logChat(msg) {
        const box = document.getElementById('chatBox');
        box.innerHTML += `<div>${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
