<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E2EE WhatsApp Killer</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* WhatsApp Desktop Style Layout */
        body { margin: 0; font-family: 'Segoe UI', Arial; display: flex; height: 100vh; background: #111b21; color: #e9edef; }
        .sidebar { width: 30%; background: #202c33; border-right: 1px solid #2f3e46; display: flex; flex-direction: column; }
        .chat-area { width: 70%; display: flex; flex-direction: column; background: #0b141a; }
        
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2f3e46;}
        .search-bar { padding: 10px; background: #202c33; }
        .search-bar input { width: 100%; padding: 8px; border-radius: 8px; border: none; background: #2a3942; color: white; box-sizing: border-box;}
        
        .chat-list { flex-grow: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #2f3e46; cursor: pointer; display: flex; align-items: center; }
        .chat-item:hover { background: #2a3942; }
        
        .messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .date-separator { align-self: center; background: #182229; padding: 5px 12px; border-radius: 10px; font-size: 12px; margin: 10px 0; color: #8696a0; }
        
        .msg { max-width: 65%; padding: 8px 12px; border-radius: 8px; margin: 2px 0; position: relative; font-size: 14.5px; }
        .msg.me { background: #005c4b; align-self: flex-end; border-top-right-radius: 0; }
        .msg.other { background: #202c33; align-self: flex-start; border-top-left-radius: 0; }
        
        .msg-info { display: flex; justify-content: flex-end; align-items: center; font-size: 11px; color: #8696a0; margin-top: 4px; gap: 4px; }
        .tick { font-size: 12px; font-weight: bold; }
        .tick.sent { color: #8696a0; } /* ✓ */
        .tick.delivered { color: #8696a0; } /* ✓✓ */
        .tick.read { color: #53bdeb; } /* 🔵 ✓✓ */
        
        .input-area { background: #202c33; padding: 15px; display: flex; gap: 10px; }
        .input-area input { flex-grow: 1; padding: 12px; border-radius: 8px; border: none; background: #2a3942; color: white; }
        .input-area button { padding: 10px 20px; border-radius: 8px; border: none; background: #00a884; color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h3 style="margin:0;">My Profile</h3>
            <span id="myStatus" style="color: #00a884; font-size: 12px;">🟢 Online</span>
        </div>
        <div class="search-bar">
            <input type="text" id="searchUser" placeholder="🔍 Search Users by ID or Name...">
        </div>
        <div class="chat-list" id="chatList">
            <div class="chat-item">
                <div style="flex-grow: 1;">
                    <div style="font-weight: bold;">Rahul (UID: 123)</div>
                    <div style="font-size: 13px; color: #8696a0;">Tap to chat</div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="header">
            <h3 style="margin:0;" id="activeChatName">Select a chat</h3>
            <span id="typingIndicator" style="color: #00a884; font-size: 13px; display: none;">typing...</span>
        </div>
        
        <div class="messages" id="messagesArea">
            <div class="date-separator">TODAY</div>
            </div>

        <div class="input-area">
            <button title="Share File">📎</button>
            <input type="text" id="msgInput" placeholder="Type a message..." oninput="handleTyping()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

<script>
    // Note: Yahan Firebase Auth aur Realtime DB ka setup aayega.
    const socket = io('http://localhost:3000');
    let myUID = "user_789"; // Example (Firebase Auth se aayega)
    let currentChatUID = "user_123"; // Jab aap chat list me kisi par click karenge
    let sharedSecretKey = "super_secure_key_123"; // E2EE key for this specific chat

    // Connect hotey hi server ko apna UID batao
    socket.on('connect', () => {
        socket.emit('user_online', myUID);
    });

    function sendMessage() {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        
        const msgId = Date.now().toString(); // Unique ID for ticks
        
        // 1. Client-Side Encryption
        const encryptedMsg = CryptoJS.AES.encrypt(text, sharedSecretKey).toString();
        
        // 2. UI me render karo (Single Tick ke sath)
        renderMessage(text, 'me', msgId, 'sent');
        
        // 3. Node API ko bhej do (Fast Transfer)
        socket.emit('send_private_msg', {
            msgId: msgId,
            senderId: myUID,
            receiverId: currentChatUID,
            encryptedData: encryptedMsg,
            timestamp: Date.now()
        });
        
        document.getElementById('msgInput').value = '';
    }

    // Tick Status Update Receiver
    socket.on('msg_status_update', (data) => {
        const { msgId, status } = data;
        const tickElement = document.getElementById(`tick-${msgId}`);
        if(tickElement) {
            tickElement.className = `tick ${status}`;
            if(status === 'sent') tickElement.innerText = '✓';
            if(status === 'delivered') tickElement.innerText = '✓✓';
            if(status === 'read') tickElement.innerText = '✓✓'; // CSS ise blue kar dega
        }
    });

    // Message Receive Logic
    socket.on('receive_private_msg', (payload) => {
        if(payload.senderId === currentChatUID) {
            // Decrypt message
            const bytes = CryptoJS.AES.decrypt(payload.encryptedData, sharedSecretKey);
            const decryptedMsg = bytes.toString(CryptoJS.enc.Utf8);
            
            renderMessage(decryptedMsg, 'other', payload.msgId, null);
            
            // Server ko batao ki msg padh liya (Blue tick bhejo sender ko)
            socket.emit('mark_as_read', { msgId: payload.msgId, senderId: payload.senderId });
        }
    });

    // Helper: Render Message in UI
    function renderMessage(text, senderType, msgId, initialTick) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${senderType}`;
        
        let tickHTML = '';
        if(senderType === 'me') {
            const tickMark = initialTick === 'sent' ? '✓' : '✓✓';
            tickHTML = `<span id="tick-${msgId}" class="tick ${initialTick}">${tickMark}</span>`;
        }

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        msgDiv.innerHTML = `
            ${text}
            <div class="msg-info">
                <span>${time}</span>
                ${tickHTML}
            </div>
        `;
        document.getElementById('messagesArea').appendChild(msgDiv);
    }
</script>
</body>
</html>
