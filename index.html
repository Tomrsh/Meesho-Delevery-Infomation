<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #customer-map { height: 250px; width: 100%; border-radius: 12px; margin-top: 15px; display: none; }
        .driver-live-icon { background: #2563eb; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 8px #2563eb; }
        .user-live-icon { background: #10b981; border: 2px solid white; border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 w-full max-w-md shadow-2xl text-center">
        <div class="text-sky-400 text-5xl mb-3">
            <i class="fa-solid fa-truck-fast"></i>
        </div>
        <h2 class="text-xl font-bold mb-1" id="welcome-text">Order Delivery</h2>
        <p class="text-xs text-slate-400 mb-4">
            नमस्ते! आपका डिलीवरी पार्टनर आपके एरिया में है। सही पते पर फ़ास्ट डिलीवरी के लिए कृपया नीचे बटन दबाकर अपनी लोकेशन कन्फर्म करें।
        </p>

        <button id="share-btn" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-md">
            <i class="fa-solid fa-location-crosshairs"></i> Confirm & Share Location
        </button>

        <p id="status-msg" class="mt-3 text-xs font-medium text-amber-400"></p>

        <!-- लाइव ट्रैकिंग डिस्प्ले कार्ड -->
        <div id="tracking-info" class="mt-4 p-3 bg-slate-900 rounded-xl border border-slate-700 text-left hidden">
            <div class="flex justify-between items-center text-sm mb-1">
                <span class="text-slate-400"><i class="fa-solid fa-user-ninja text-sky-400"></i> Delivery Boy:</span>
                <span id="driver-status" class="font-bold text-green-400">On the way</span>
            </div>
            <div class="text-xs text-slate-400">दूरभाष / दूरी: <span id="distance-display" class="text-white font-bold">Calculating...</span></div>
        </div>

        <div id="customer-map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAb7V8Xxg5rUYi8UKChEd3rR5dglJ6bLhU",
            authDomain: "t2-storage-4e5ca.firebaseapp.com",
            databaseURL: "https://t2-storage-4e5ca-default-rtdb.firebaseio.com",
            projectId: "t2-storage-4e5ca"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('customer') || "Customer_" + Math.floor(Math.random() * 900 + 100);
        
        document.getElementById('welcome-text').innerText = "Hello, " + customerId;

        let map = null;
        let customerMarker = null;
        let driverMarker = null;
        let customerCoords = null;

        document.getElementById('share-btn').addEventListener('click', () => {
            const statusMsg = document.getElementById('status-msg');

            if (!navigator.geolocation) {
                statusMsg.innerText = "आपका ब्राउज़र GPS सपोर्ट नहीं करता।";
                return;
            }

            statusMsg.innerText = "GPS से कनेक्ट हो रहा है...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    customerCoords = [latitude, longitude];

                    // Firebase में अपनी लोकेशन सेंड करना
                    database.ref('active_deliveries/' + customerId).set({
                        customerName: customerId,
                        lat: latitude,
                        lng: longitude,
                        time: new Date().toLocaleTimeString()
                    }).then(() => {
                        statusMsg.innerText = "✔ लोकेशन कन्फर्म हो गई! आप नीचे लाइव ट्रैक देख सकते हैं।";
                        statusMsg.className = "mt-3 text-xs font-medium text-green-400";
                        document.getElementById('share-btn').style.display = 'none';
                        
                        // मैप सेटअप करना और ड्राइवर को ट्रैक करना शुरू करना
                        initCustomerMap(latitude, longitude);
                        startTrackingDriver();
                    }).catch(() => {
                        statusMsg.innerText = "डेटा सेव नहीं हो सका। कृपया दोबारा कोशिश करें।";
                    });
                },
                (error) => {
                    statusMsg.innerText = "कृपया लोकेशन सेटिंग को 'Allow' करें।";
                },
                { enableHighAccuracy: true }
            );
        });

        function initCustomerMap(lat, lng) {
            document.getElementById('customer-map').style.display = 'block';
            document.getElementById('tracking-info').style.display = 'block';
            
            map = L.map('customer-map', { zoomControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const cIcon = L.divIcon({ className: 'user-live-icon', iconSize: [12, 12] });
            customerMarker = L.marker([lat, lng], { icon: cIcon }).addTo(map).bindPopup("Your Delivery Address").openPopup();
        }

        // ड्राइवर की लाइव लोकेशन Firebase से सुनना और दूरी नापना
        function startTrackingDriver() {
            database.ref('driver_location').on('value', (snapshot) => {
                const driverData = snapshot.val();
                if (!driverData || !customerCoords) return;

                const dCoords = [driverData.lat, driverData.lng];

                // ड्राइवर का मार्कर अपडेट या क्रिएट करना
                if (!driverMarker) {
                    const dIcon = L.divIcon({ className: 'driver-live-icon', iconSize: [14, 14] });
                    driverMarker = L.marker(dCoords, { icon: dIcon }).addTo(map).bindPopup("Delivery Partner").openPopup();
                } else {
                    driverMarker.setLatLng(dCoords);
                }

                // दोनों के बीच की हवाई दूरी कैलकुलेट करना
                const from = L.latLng(customerCoords);
                const to = L.latLng(dCoords);
                const distanceKM = (from.distanceTo(to) / 1000).toFixed(2);

                document.getElementById('distance-display').innerText = distanceKM + " KM दूर है";

                // मैप का व्यू दोनों को दिखाने के लिए फिट करना
                const group = new L.featureGroup([customerMarker, driverMarker]);
                map.fitBounds(group.pad(0.2));
            });
        }
    </script>
</body>
</html>
